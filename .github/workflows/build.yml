name: Package Thunderbird Extension

on:
  push:
    branches: [main]
    tags:
      - 'v*.*'
  workflow_dispatch:
    inputs:
      release:
        description: 'Run release step when manually triggered'
        required: false
        default: 'false'
        type: boolean
      tag:
        description: 'Tag to release, e.g. v1.2'
        required: false
        default: ''
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create ZIP package
        env:
          RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || github.event_name == 'workflow_dispatch' && github.event.inputs.tag || '' }}
        run: |
          TAG="${RELEASE_TAG:-latest}"
          mkdir -p dist
          zip -r "dist/audio_preview-${TAG}.xpi" images/ src/ manifest.json LICENSE.txt *.md *.png *.js *.html *.css

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: AudioPreview-xpi
          path: dist/

      - name: Release
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'true' && github.event.inputs.tag != '')
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          body: New version.
          files: dist/audio_preview-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}.xpi
